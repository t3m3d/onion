<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>The People Wire</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;}
body{font-family:"Helvetica Neue",Arial,"Segoe UI",system-ui,sans-serif;background:radial-gradient(120% 90% at 50% 32%, #15151f 0%, #08080d 55%, #000000 100%);}
.ad{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:3.2vmin;padding:6vmin;}
.iconwrap{position:relative;display:flex;align-items:center;justify-content:center;animation:fadeUp .7s ease-out both;}
.iconwrap::before{content:"";position:absolute;width:150%;height:150%;border-radius:50%;display:block;
 background:radial-gradient(closest-side,rgba(90,100,180,.26),rgba(90,100,180,0) 72%);animation:breathe 4.5s ease-in-out infinite;}
.icon{position:relative;width:clamp(120px,34vmin,340px);height:auto;display:block;}
.brand{font-weight:800;letter-spacing:-0.01em;line-height:1;font-size:clamp(30px,9.2vmin,86px);color:#ffffff;animation:fadeUp .7s ease-out .12s both;}
.brand b{color:#fed904;font-weight:800;}
.tag{color:#cfd2dd;font-weight:700;line-height:1.18;font-size:clamp(15px,4.3vmin,40px);max-width:90vw;animation:fadeUp .7s ease-out .24s both;}
.badge{width:clamp(150px,40vmin,340px);height:auto;margin-top:1.5vmin;animation:fadeUp .7s ease-out .36s both,nudge 5s ease-in-out 1.2s infinite;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px) scale(.98);}to{opacity:1;transform:none;}}
@keyframes breathe{0%,100%{transform:scale(1);opacity:.8;}50%{transform:scale(1.08);opacity:1;}}
@keyframes nudge{0%,92%,100%{transform:translateY(0);}96%{transform:translateY(-4px);}}
@media (orientation:landscape){.ad{flex-direction:row;text-align:left;gap:7vmin;}.iconwrap{margin-top:8vmin;margin-left:-3vmin;}.col{display:flex;flex-direction:column;align-items:flex-start;gap:2.4vmin;max-width:60vw;}.icon{width:clamp(120px,30vmin,300px);}.brand{font-size:clamp(30px,8vmin,92px);}.tag{font-size:clamp(15px,3.6vmin,40px);}.badge{align-self:center;}}
@media (orientation:portrait){.col{display:contents;}}
@media (prefers-reduced-motion:reduce){.iconwrap,.brand,.tag,.badge{animation:none!important;opacity:1!important;transform:none!important;}.iconwrap::before{animation:none;}}
</style></head>
